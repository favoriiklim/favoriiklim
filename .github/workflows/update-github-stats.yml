name: Update custom GitHub stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-stats
  cancel-in-progress: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 1
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        timeout-minutes: 1
        with:
          python-version: "3.12"

      - name: Generate stats SVG
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          GITHUB_USERNAME: favoriiklim
        run: python scripts/generate_github_stats.py

      - name: Commit updated SVG
        timeout-minutes: 1
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/github-stats.svg
          git diff --staged --quiet || git commit -m "Update GitHub stats card"
          git push
